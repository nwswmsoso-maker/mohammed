<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة | صالون محمد عدنان</title>
    <!-- استدعاء خط Cairo الفخم -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- استدعاء الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --primary-gold: #d4af37;
            --primary-gold-hover: #b5952f;
            --text-main: #ffffff;
            --text-muted: #8b8d93;
            --success: #28a745;
            --danger: #dc3545;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* الشريط الجانبي (Sidebar) */
        .sidebar {
            width: 280px;
            background-color: var(--card-bg);
            padding: 30px 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-area i {
            font-size: 40px;
            color: var(--primary-gold);
            margin-bottom: 10px;
        }

        .logo-area h2 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .logo-area span {
            color: var(--primary-gold);
        }

        .nav-items {
            list-style: none;
        }

        .nav-items li {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--primary-gold);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* المحتوى الرئيسي (Main Content) */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        /* الإحصائيات السريعة */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--primary-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-info h4 {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
        }

        .stat-info h2 {
            font-size: 24px;
            margin-top: 5px;
        }

        /* شبكة الحجوزات (Queue Grid) */
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .queue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .customer-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .customer-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
        }

        /* شريط الحالة الملون في أعلى البطاقة */
        .card-status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }
        .status-pending { background-color: var(--primary-gold); }
        .status-approved { background-color: var(--success); }

        .customer-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .customer-avatar {
            width: 50px;
            height: 50px;
            background-color: #2a2e39;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-muted);
        }

        .customer-details h3 {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .service-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            background-color: rgba(255,255,255,0.05);
            font-size: 12px;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-call {
            background-color: var(--primary-gold);
            color: #000;
        }

        .btn-call:hover {
            background-color: var(--primary-gold-hover);
        }

        .btn-done {
            background-color: rgba(40, 167, 69, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .btn-done:hover {
            background-color: var(--success);
            color: #fff;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <!-- الشريط الجانبي -->
    <aside class="sidebar">
        <div class="logo-area">
            <i class="fa-solid fa-scissors"></i>
            <h2>صالون <span>محمد عدنان</span></h2>
        </div>
        <ul class="nav-items">
            <li><i class="fa-solid fa-list-ul"></i> قائمة الحجوزات</li>
            <!-- يمكن إضافة المزيد من الأقسام مستقبلاً هنا مثل الإعدادات وغيرها -->
        </ul>
    </aside>

    <!-- المحتوى الرئيسي -->
    <main class="main-content">
        <div class="header">
            <div>
                <h1>لوحة التحكم</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">إدارة حجوزات الزبائن لحظة بلحظة</p>
            </div>
            <div id="clock" style="font-size: 18px; font-weight: bold; color: var(--primary-gold);"></div>
        </div>

        <!-- الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                <div class="stat-info">
                    <h4>في قاعة الانتظار</h4>
                    <h2 id="pendingCount">0</h2>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-chair"></i></div>
                <div class="stat-info">
                    <h4>على كرسي الحلاقة</h4>
                    <h2 id="approvedCount">0</h2>
                </div>
            </div>
        </div>

        <!-- قائمة الحجوزات -->
        <h3 class="section-title"><i class="fa-regular fa-clock"></i> الزبائن الحاليين</h3>
        <div class="queue-grid" id="queueList">
            <!-- سيتم إضافة البطاقات هنا عن طريق الجافاسكريبت -->
        </div>
    </main>

    <script>
        // إعداد Supabase (ضع مفتاحك هنا)
        const SUPABASE_URL = 'https://hoskjuzxrmzuarobofp.supabase.co'; 
        const SUPABASE_KEY = 'ضع_مفتاحك_هنا'; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ساعة رقمية في الأعلى
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-IQ');
        }, 1000);

        async function fetchQueue() {
            // جلب البيانات مع ربطها بجدول الخدمات (LOS) لمعرفة اسم الخدمة
            const { data, error } = await supabase
                .from('appointments')
                .select('*, services(service_name)') 
                .in('status', ['pending', 'approved'])
                .order('created_at', { ascending: true });

            if (error) {
                console.error("خطأ في جلب البيانات:", error);
                return;
            }

            const listDiv = document.getElementById('queueList');
            listDiv.innerHTML = '';

            let pending = 0;
            let approved = 0;

            if (data.length === 0) {
                listDiv.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-mug-hot"></i>
                        <h3>لا يوجد زبائن في الانتظار حالياً</h3>
                        <p>استرح وتناول كوباً من القهوة!</p>
                    </div>`;
            } else {
                data.forEach(customer => {
                    // حساب الإحصائيات
                    if(customer.status === 'pending') pending++;
                    if(customer.status === 'approved') approved++;

                    // إذا لم يكن هناك خدمة محددة، نعرض "غير محدد"
                    const serviceName = customer.services ? customer.services.service_name : 'خدمة عامة';
                    const isPending = customer.status === 'pending';

                    // إنشاء بطاقة الزبون
                    const card = document.createElement('div');
                    card.className = 'customer-card';
                    card.innerHTML = `
                        <div class="card-status-bar ${isPending ? 'status-pending' : 'status-approved'}"></div>
                        <div class="customer-info">
                            <div class="customer-avatar">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <div class="customer-details">
                                <h3>${customer.customer_name}</h3>
                                <span class="service-tag"><i class="fa-solid fa-scissors"></i> ${serviceName}</span>
                            </div>
                        </div>
                        <div style="font-size: 13px; color: var(--text-muted);">
                            <i class="fa-solid fa-circle-info"></i> الحالة: ${isPending ? '<span style="color:#d4af37">ينتظر دوره</span>' : '<span style="color:#28a745">يحلق الآن</span>'}
                        </div>
                        
                        <div class="card-actions">
                            ${isPending ? 
                                `<button class="btn btn-call" onclick="updateStatus(${customer.id}, 'approved')">
                                    <i class="fa-solid fa-bullhorn"></i> استدعاء للكرسي
                                </button>` 
                                : 
                                `<button class="btn btn-done" onclick="updateStatus(${customer.id}, 'completed')">
                                    <i class="fa-solid fa-check-double"></i> إنهاء الدفع وإخفاء
                                </button>`
                            }
                        </div>
                    `;
                    listDiv.appendChild(card);
                });
            }

            // تحديث الإحصائيات في الأعلى
            document.getElementById('pendingCount').innerText = pending;
            document.getElementById('approvedCount').innerText = approved;
        }

        async function updateStatus(id, newStatus) {
            await supabase
                .from('appointments')
                .update({ status: newStatus })
                .eq('id', id);
            
            fetchQueue(); // تحديث القائمة فوراً
        }

        // تحديث البيانات أول مرة، ثم كل 3 ثواني لتكون سريعة جداً مثل "الريال تايم"
        fetchQueue();
        setInterval(fetchQueue, 3000);
    </script>
</body>
</html>
